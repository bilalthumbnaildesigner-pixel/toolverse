<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | ToolVerse</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,Arial,sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:550px;
            background:#1e293b;
            padding:35px;
            border-radius:20px;
            box-shadow:0 20px 60px rgba(0,0,0,.4);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input[type="text"]{
            width:100%;
            padding:15px;
            font-size:18px;
            border:none;
            border-radius:10px;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin:12px 0;
        }

        input[type="range"]{
            width:100%;
            margin:15px 0;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Password Generator</h1>

    <input id="password" readonly>

    <p>Password Length:
        <span id="lengthValue">12</span>
    </p>

    <input id="length" type="range" min="6" max="40" value="12">

    <label><input type="checkbox" id="upper" checked> Uppercase</label>

    <label><input type="checkbox" id="lower" checked> Lowercase</label>

    <label><input type="checkbox" id="number" checked> Numbers</label>

    <label><input type="checkbox" id="symbol" checked> Symbols</label>

    <button onclick="generatePassword()">Generate Password</button>

    <button onclick="copyPassword()">Copy Password</button>

</div>

<script>

const password=document.getElementById("password");
const length=document.getElementById("length");
const lengthValue=document.getElementById("lengthValue");

length.oninput=()=>{
    lengthValue.textContent=length.value;
}

function generatePassword(){

let chars="";

if(document.getElementById("upper").checked)
chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

if(document.getElementById("lower").checked)
chars+="abcdefghijklmnopqrstuvwxyz";

if(document.getElementById("number").checked)
chars+="0123456789";

if(document.getElementById("symbol").checked)
chars+="!@#$%^&*()_+-={}[]<>?";

if(chars===""){
alert("Select at least one option.");
return;
}

let pass="";

for(let i=0;i<length.value;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}

password.value=pass;

}

function copyPassword(){

password.select();

document.execCommand("copy");

alert("Password copied!");

}

generatePassword();

</script>

</body>
</html>
