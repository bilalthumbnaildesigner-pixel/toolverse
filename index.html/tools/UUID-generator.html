<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UUID Generator | ToolVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0f172a;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

color:white;

}

.container{

width:100%;

max-width:700px;

background:#1e293b;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.4);

text-align:center;

}

h1{

margin-bottom:30px;

}

.uuid{

background:#0f172a;

padding:25px;

border-radius:15px;

font-size:20px;

word-break:break-all;

margin-bottom:25px;

color:#38bdf8;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

margin-top:15px;

background:#2563eb;

color:white;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.back{

display:inline-block;

margin-top:25px;

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1>🆔 UUID Generator</h1>

<div id="uuid" class="uuid"></div>

<button onclick="generateUUID()">

Generate UUID

</button>

<button onclick="copyUUID()">

Copy UUID

</button>

<a href="../index.html" class="back">

← Back to Home

</a>

</div>

<script>

function generateUUID(){

let uuid=crypto.randomUUID();

document.getElementById("uuid").innerText=uuid;

}

function copyUUID(){

navigator.clipboard.writeText(document.getElementById("uuid").innerText);

alert("UUID Copied!");

}

generateUUID();

</script>

</body>

</html>
