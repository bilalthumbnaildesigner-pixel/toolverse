<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Number Generator | ToolVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:600px;
background:#1e293b;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
text-align:center;
}

h1{
margin-bottom:30px;
}

label{
display:block;
text-align:left;
margin:15px 0 8px;
font-weight:500;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
outline:none;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:30px;
padding:25px;
background:#0f172a;
border-radius:15px;
}

.result h2{
font-size:50px;
color:#38bdf8;
}

.back{
display:inline-block;
margin-top:30px;
color:#38bdf8;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<h1>🎲 Random Number Generator</h1>

<label>Minimum Number</label>
<input type="number" id="min" value="1">

<label>Maximum Number</label>
<input type="number" id="max" value="100">

<button onclick="generateNumber()">
Generate Random Number
</button>

<div class="result">
<h2 id="output">0</h2>
</div>

<a href="../index.html" class="back">
← Back to Home
</a>

</div>

<script>

function generateNumber(){

let min=parseInt(document.getElementById("min").value);
let max=parseInt(document.getElementById("max").value);

if(isNaN(min)||isNaN(max)){

alert("Please enter valid numbers.");
return;

}

if(min>max){

alert("Minimum number cannot be greater than maximum number.");
return;

}

let random=Math.floor(Math.random()*(max-min+1))+min;

document.getElementById("output").innerText=random;

}

generateNumber();

</script>

</body>
</html>
