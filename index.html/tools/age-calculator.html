<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator | ToolVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0f172a;
color:white;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

}

.container{

width:100%;
max-width:600px;

background:#1e293b;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.35);

text-align:center;

}

h1{

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:10px;

margin:20px 0;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.result{

margin-top:30px;

background:#0f172a;

padding:25px;

border-radius:15px;

display:none;

}

.result h2{

margin-bottom:20px;

color:#38bdf8;

}

.result p{

margin:12px 0;

font-size:18px;

}

.back{

display:inline-block;

margin-top:30px;

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1>🎂 Age Calculator</h1>

<p>Select your Date of Birth</p>

<input type="date" id="dob">

<button onclick="calculateAge()">

Calculate Age

</button>

<div class="result" id="result">

<h2>Your Age</h2>

<p id="years"></p>

<p id="months"></p>

<p id="days"></p>

</div>

<a class="back" href="../index.html">

← Back to Home

</a>

</div>

<script>

function calculateAge(){

let dob=document.getElementById("dob").value;

if(!dob){

alert("Please select your date of birth.");

return;

}

let birth=new Date(dob);

let today=new Date();

let years=today.getFullYear()-birth.getFullYear();
let months=today.getMonth()-birth.getMonth();
let days=today.getDate()-birth.getDate();

if(days<0){

months--;

const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
days += previousMonth.getDate();

}

if(months<0){

years--;
months+=12;

}

document.getElementById("years").innerHTML="🎉 Years : <strong>"+years+"</strong>";

document.getElementById("months").innerHTML="📅 Months : <strong>"+months+"</strong>";

document.getElementById("days").innerHTML="📆 Days : <strong>"+days+"</strong>";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
