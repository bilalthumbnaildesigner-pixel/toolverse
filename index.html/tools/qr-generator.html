<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator | ToolVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.container{

width:100%;
max-width:550px;

background:#1e293b;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.4);

text-align:center;

}

h1{

margin-bottom:25px;

}

input{

width:100%;

padding:16px;

border:none;

border-radius:10px;

font-size:17px;

margin-bottom:20px;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#imgBox{

margin-top:30px;

display:none;

}

#imgBox img{

width:220px;

background:white;

padding:12px;

border-radius:10px;

}

.back{

display:inline-block;

margin-top:25px;

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1>📱 QR Code Generator</h1>

<input
type="text"
id="qrText"
placeholder="Enter text or website URL">

<button onclick="generateQR()">
Generate QR Code
</button>

<div id="imgBox">

<img id="qrImage">

</div>

<a href="../index.html" class="back">
← Back to Home
</a>

</div>

<script>

let imgBox=document.getElementById("imgBox");

let qrImage=document.getElementById("qrImage");

function generateQR(){

let qrText=document.getElementById("qrText").value;

if(qrText.length==0){

alert("Please enter text.");

return;

}

qrImage.src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(qrText);

imgBox.style.display="block";

}

</script>

</body>
</html>
